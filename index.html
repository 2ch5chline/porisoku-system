<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ポリ速！">
  <link rel="apple-touch-icon" href="porisokurogo_512.png">
  <title>ポリ速！web</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .report-card { transition: transform 0.2s; }
        .report-card:hover { transform: translateY(-2px); }
    </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "60aa6243-7951-41c8-b79a-567a013cad96",
      serviceWorkerParam: { scope: "/porisoku-system/" }, 
      serviceWorkerPath: "OneSignalSDKWorker.js" 
    });
  });
</script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-green-600 text-white p-4 shadow-lg">
        <div class="container mx-auto font-bold text-xl">ポリ速！web</div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="font-bold mb-2">お知らせ</h2>
            <p class="text-sm text-gray-600">最新のポリ情報をリアルタイムで更新中。</p>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500">データを読み込み中...</div>
        <div id="report-list" class="space-y-4"></div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3s8bmMPEOXJzMdoevcdAQMY2IcxQyC1Abj1WozpXi_emqx25A0ZysMhQ-2N0IRpoB/exec";

        async function fetchReports() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const listContainer = document.getElementById('report-list');
                const loading = document.getElementById('loading');
                
                loading.style.display = 'none';
                listContainer.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'report-card bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500';
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-lg text-red-600">${item['ユーザー名'] || '不明なユーザー'}</span>
                            <span class="text-xs text-gray-400">${item['タイムスタンプ'] || ''}</span>
                        </div>
                        <p class="mt-2 text-sm spaece-y-1">
                        <p><strong>ポリった理由:</strong> ${item['ポリった理由'] || '理由未記入'}</p>
                        <p><strong>入っているオプチャ:</strong> ${item['入っているオプチャを選択'] || '未記入'}</p>
                        <p><strong>入っているオプチャ:</strong> ${item['入っているオプチャを入力7] || '未記入'}</p>
                        <p><strong>ポリ期間:</strong> ${item['ポリ期間']}</p>
                        <p><strong>ポリ解予定日:</strong> ${item['ポリ解除の予定日を入力'] || '予定日不明'}</p>
                        <p><strong>メッセージ:</strong> ${item['メッセージ'] || 'メッセージ未記入'}</p>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerText = "データの取得に失敗しました。";
            }
        }

        
        fetchReports();
        setInterval(fetchReports, 60000);
    </script>
  <style>
.post-button {
  position: fixed;
  bottom: 30px;
  right: 20px;
  background-color: #ef4444; /* 強めの赤（ポリ色） */
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  text-decoration: none;
  font-weight: bold;
  z-index: 1000;
  transition: transform 0.2s, background-color 0.2s;
}

.post-button:active {
  transform: scale(0.95);
  background-color: #dc2626;
}

.plus-icon {
  font-size: 24px;
  margin-right: 8px;
}
    
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .post-button {
    bottom: calc(30px + env(safe-area-inset-bottom));
  }
}
  </style>
  <a href="https://forms.gle/xVXub4jvQdgkCLAY8" target="_blank" class="post-button">
  <span class="plus-icon">＋</span>
  <span class="button-text">報告する</span>
</a>
</body>
</html>
