<body class="bg-gray-50 text-gray-800">

    <nav class="bg-green-600 text-white p-4 shadow-lg">
        <div class="container mx-auto font-bold space-x-6">
          <div class="text-xl">ポリ速！web</div>
          <ul>
            <li>
              <a href="https://sites.google.com/view/2ch5chlineweb/home">LINE公式</a></li>
            </ul>
        </ul>
      </div>
    </nav>
        
    <main class="container mx-auto p-4 max-w-2xl">
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="font-bold mb-2">お知らせ</h2>
            <p class="text-sm text-gray-600">最新のポリ情報をリアルタイムで更新中。</p>
        </div>
    <main class="container mx-auto p-4 max-w-2xl">
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
        　　 <h2 class="font-bold mb-2">報告方法</h2>
            <p class="text-sm text-gray-600">1.「報告する」を選択 2.フォームに必要事項を入力 3.送信する</p>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500">データを読み込み中...</div>
        <div id="report-list" class="space-y-4"></div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxv6I2i2tjhal2Q8YC1QwQWhNvxa1C8jOxBqBlEWz4-hQ7DOATDllOhiOX_U8hpaUI-/exec";

        async function fetchReports() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const listContainer = document.getElementById('report-list');
                const loading = document.getElementById('loading');
                
                loading.style.display = 'none';
                listContainer.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'report-card bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500';
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-lg text-red-600">${item['ユーザー名'] || '不明なユーザー'}</span>
                            <span class="text-xs text-gray-400">${item['タイムスタンプ'] || ''}</span>
                        </div>
                        <p class="mt-2 text-sm spaece-y-1">
                        <p><strong>ポリった理由:</strong> ${item['ポリった理由'] || '理由未記入'}</p>
                        <p><strong>入っているオプチャ:</strong> ${item['入っているオプチャを選択 (series 2ch・5ch)'] || '未記入'}</p>
                        <p><strong>入っているオプチャ:</strong> ${item['入っているオプチャを入力'] || '未記入'}</p>
                        <p><strong>ポリ期間:</strong> ${item['ポリ期間'] || '未記入'}</p>
                        <p><strong>ポリ対象:</strong> ${item['ポリの対象'] || '未記入'}</p>
                        <p><strong>ポリ解予定日:</strong> ${item['ポリ解除の予定日を入力'] || '予定日不明'}</p>
                        <p><strong>メッセージ:</strong> ${item['メッセージ'] || 'メッセージ未記入'}</p>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerText = "データの取得に失敗しました。";
            }
        }

        
        fetchReports();
        setInterval(fetchReports, 60000);
    </script>
