<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポリ速！web</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .report-card { transition: transform 0.2s; }
        .report-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-red-600 text-white p-4 shadow-lg">
        <div class="container mx-auto font-bold text-xl">🚀 ポリ速！報告サイト</div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="font-bold mb-2">お知らせ</h2>
            <p class="text-sm text-gray-600">最新のポリ情報をリアルタイムで更新中。通知をオンにして最新情報をチェックしてください。</p>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500">データを読み込み中...</div>
        <div id="report-list" class="space-y-4"></div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyUZ3k95Y0cKQCi7EsRLOL6lZw86cqx8KL4Z74_Rm_jSyMWm5DNVwPSHdLxTojcPo04/exec";

        async function fetchReports() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                const listContainer = document.getElementById('report-list');
                const loading = document.getElementById('loading');
                
                loading.style.display = 'none';
                listContainer.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'report-card bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500';
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-lg text-red-600">${item['ユーザー名'] || '不明なユーザー'}</span>
                            <span class="text-xs text-gray-400">${item['タイムスタンプ'] || ''}</span>
                        </div>
                        <p class="mt-2 text-gray-700 text-sm">${item['理由'] || '理由未記入'}</p>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerText = "データの取得に失敗しました。";
            }
        }

        // 初回読み込み
        fetchReports();
        // 1分ごとに自動更新
        setInterval(fetchReports, 60000);
    </script>
</body>
</html>
